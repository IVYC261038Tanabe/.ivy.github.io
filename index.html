<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      line-height: 1.8;
      color: #333;
      background: #f7f7f7;
    }

    a {
      text-decoration: none;
      color: #333;
      transition: 0.3s;
    }

    a:hover {
      color: #777;
    }

    /* ヘッダー */
    header {
      position: relative;
      width: 100%;
      height: 60vh;
      overflow: hidden;
    }

    header img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .header-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
      background: rgba(0, 0, 0, 0.4);
      padding: 20px 40px;
      border-radius: 10px;
    }

    .header-text h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .header-text p {
      font-size: 1.1rem;
    }

    /* メイン */
    main {
      max-width: 1000px;
      margin: 60px auto;
      padding: 0 20px;
    }

    section {
      background: white;
      margin-bottom: 30px;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    section h2 {
      font-size: 2rem;
      margin-bottom: 20px;
      border-left: 5px solid #333;
      padding-left: 12px;
    }

    .profile {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .profile img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .skill {
      background: #333;
      color: white;
      padding: 10px 18px;
      border-radius: 30px;
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: #777;
      font-size: 0.9rem;
    }

    /* レスポンシブ */
    @media (max-width: 768px) {
      .header-text h1 {
        font-size: 2rem;
      }

      .profile {
        flex-direction: column;
        text-align: center;
      }

      section {
        padding: 25px;
      }
    }
  </style>
</head>

<body>

  <!-- ヘッダー -->
  <header>
    <img src="download.jpg" alt="header image">

    <div class="header-text">
      <h1>Your Name</h1>
      <p>Web Developer / Designer</p>
    </div>
  </header>

  <!-- メイン -->
  <main>

    <!-- 自己紹介 -->
    <section>
      <h2>About</h2>

      <div class="profile">
        <img src="img/profile.jpg" alt="profile">

        <div>
          <p>
            はじめまして。〇〇です。<br>
            Webデザインやプログラミングを学習しています。<br>
            シンプルで使いやすいデザインが好きです。
          </p>
        </div>
      </div>
    </section>

    <!-- スキル -->
    <section>
      <h2>Skills</h2>

      <div class="skills">
        <div class="skill">HTML</div>
        <div class="skill">CSS</div>
        <div class="skill">JavaScript</div>
        <div class="skill">Responsive Design</div>
      </div>
    </section>

    <!-- SNS -->
    <section>
      <h2>Links</h2>

      <p>
        <a href="#">X (Twitter)</a><br>
        <a href="#">Instagram</a><br>
        <a href="#">GitHub</a>
      </p>
    </section>

  </main>

  <!-- フッター -->
  <footer>
    © 2026 Your Name
  </footer>

</body>
</html>
